name: Update kiro-ide-bin

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check latest version
        id: version
        run: |
          LATEST=$(curl -s https://prod.download.desktop.kiro.dev/stable/metadata-linux-x64-stable.json | jq -r .currentRelease)
          CURRENT=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Latest: $LATEST, Current: $CURRENT"

      - name: Update PKGBUILD
        if: steps.version.outputs.latest != steps.version.outputs.current
        env:
          VERSION: ${{ steps.version.outputs.latest }}
        run: |
          BASE="https://prod.download.desktop.kiro.dev/releases/stable/linux-x64/signed/${VERSION}/tar"

          # Download files for hashing
          curl -sL "$BASE/kiro-ide-${VERSION}-stable-linux-x64.tar.gz" -o kiro.tar.gz
          curl -sL "$BASE/signature.bin" -o signature.bin
          curl -sL "$BASE/certificate.pem" -o certificate.pem

          # Compute b2sums
          B2_TAR=$(b2sum kiro.tar.gz | cut -d' ' -f1)
          B2_SIG=$(b2sum signature.bin | cut -d' ' -f1)
          B2_CERT=$(b2sum certificate.pem | cut -d' ' -f1)
          B2_LIC=$(b2sum Kiro-LICENSE.txt | cut -d' ' -f1)

          # Update pkgver and pkgrel
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # Update b2sums array
          python3 - <<EOF
          import re

          with open('PKGBUILD', 'r') as f:
              content = f.read()

          new_b2sums = f"""b2sums=('{B2_TAR}'
          '{B2_SIG}'
          '{B2_CERT}'
          '{B2_LIC}')"""

          content = re.sub(r"b2sums=\(.*?\)", new_b2sums, content, flags=re.DOTALL)

          with open('PKGBUILD', 'w') as f:
              f.write(content)
          EOF

          rm kiro.tar.gz signature.bin certificate.pem

      - name: Generate .SRCINFO
        if: steps.version.outputs.latest != steps.version.outputs.current
        uses: docker://archlinux:latest
        with:
          args: bash -c "pacman -Sy --noconfirm base-devel && cd /github/workspace && makepkg --printsrcinfo > .SRCINFO"

      - name: Commit and push to GitHub
        if: steps.version.outputs.latest != steps.version.outputs.current
        env:
          VERSION: ${{ steps.version.outputs.latest }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "update: $VERSION"
          git push

      - name: Push to AUR
        if: steps.version.outputs.latest != steps.version.outputs.current
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
            StrictHostKeyChecking no
          EOF
          git remote add aur ssh://aur@aur.archlinux.org/kiro-ide-bin.git
          git push aur main:master
