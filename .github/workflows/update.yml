name: Update kiro-ide-bin

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Force specific version (leave empty for latest)'
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      latest: ${{ steps.check.outputs.latest }}
      current: ${{ steps.check.outputs.current }}
      needs_update: ${{ steps.check.outputs.needs_update }}
    steps:
      - uses: actions/checkout@v4
      - name: Check version
        id: check
        run: |
          LATEST=${{ github.event.inputs.version || '$(curl -s https://prod.download.desktop.kiro.dev/stable/metadata-linux-x64-stable.json | jq -r .currentRelease)' }}
          LATEST=$(curl -s https://prod.download.desktop.kiro.dev/stable/metadata-linux-x64-stable.json | jq -r .currentRelease)
          [[ -n "${{ github.event.inputs.version }}" ]] && LATEST="${{ github.event.inputs.version }}"
          CURRENT=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          [[ "$LATEST" != "$CURRENT" ]] && echo "needs_update=true" >> $GITHUB_OUTPUT || echo "needs_update=false" >> $GITHUB_OUTPUT
          echo "Latest: $LATEST | Current: $CURRENT"

  update:
    needs: check
    if: needs.check.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download sources and compute hashes
        env:
          VERSION: ${{ needs.check.outputs.latest }}
        run: |
          BASE="https://prod.download.desktop.kiro.dev/releases/stable/linux-x64/signed/${VERSION}/tar"
          curl -L "$BASE/kiro-ide-${VERSION}-stable-linux-x64.tar.gz" -o kiro.tar.gz
          curl -sL "$BASE/signature.bin" -o signature.bin
          curl -sL "$BASE/certificate.pem" -o certificate.pem

          # Verify signature
          openssl x509 -pubkey -noout -in certificate.pem > pubkey.pem
          openssl dgst -sha256 -verify pubkey.pem -signature signature.bin kiro.tar.gz

          echo "B2_TAR=$(b2sum kiro.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "B2_SIG=$(b2sum signature.bin | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "B2_CERT=$(b2sum certificate.pem | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "B2_LIC=$(b2sum Kiro-LICENSE.txt | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Patch PKGBUILD
        env:
          VERSION: ${{ needs.check.outputs.latest }}
        run: |
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          python3 - <<EOF
          import re
          with open('PKGBUILD') as f:
              content = f.read()
          new_b2sums = """b2sums=('$B2_TAR'
                  '$B2_SIG'
                  '$B2_CERT'
                  '$B2_LIC')"""
          content = re.sub(r"b2sums=\(.*?\)", new_b2sums, content, flags=re.DOTALL)
          with open('PKGBUILD', 'w') as f:
              f.write(content)
          EOF

      - name: Generate .SRCINFO
        uses: docker://archlinux:latest
        with:
          args: bash -c "pacman -Sy --noconfirm base-devel && cd /github/workspace && makepkg --printsrcinfo > .SRCINFO"

      - name: Lint with namcap
        uses: docker://archlinux:latest
        with:
          args: bash -c "pacman -Sy --noconfirm namcap && cd /github/workspace && namcap PKGBUILD"

      - name: Commit and push to GitHub
        env:
          VERSION: ${{ needs.check.outputs.latest }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "update: $VERSION"
          git push

      - name: Push to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
            StrictHostKeyChecking no
          EOF
          git remote add aur ssh://aur@aur.archlinux.org/kiro-ide-bin.git || true
          git push aur main:master

  notify:
    needs: [check, update]
    if: always() && needs.check.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          if [[ "${{ needs.update.result }}" == "success" ]]; then
            echo "✅ Successfully updated to ${{ needs.check.outputs.latest }}"
          else
            echo "❌ Update to ${{ needs.check.outputs.latest }} failed"
            exit 1
          fi
